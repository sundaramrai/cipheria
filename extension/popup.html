<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyVault</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23f59e0b'/%3E%3Cg transform='translate(6,6) scale(0.833)' fill='none' stroke='%230a0908' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4'/%3E%3C/g%3E%3C/svg%3E" />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0908;
      --bg-card: #111009;
      --bg-elevated: #19170f;
      --border: rgba(251, 191, 36, 0.12);
      --border-hover: rgba(251, 191, 36, 0.3);
      --text-primary: #f5f0e8;
      --text-secondary: #9b9480;
      --accent: #f59e0b;
      --accent-dim: rgba(245, 158, 11, 0.12);
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      width: 380px;
      min-height: 500px;
      max-height: 600px;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* Screens */
    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .screen.active {
      display: flex;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Inputs */
    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.4);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.08);
    }

    input::placeholder {
      color: var(--text-secondary);
    }

    /* Buttons */
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--accent);
      color: #0a0908;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #d97706;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      color: var(--text-primary);
      border-color: var(--border-hover);
      background: var(--accent-dim);
    }

    .btn-icon {
      width: 30px;
      height: 30px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .btn-icon:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
      background: var(--accent-dim);
    }

    /* Vault items */
    .item-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .item:hover {
      background: var(--accent-dim);
      border-color: var(--border);
    }

    .item-icon {
      width: 32px;
      height: 32px;
      border-radius: 7px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-size: 13px;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-sub {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    /* Field display */
    .field {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .field-label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .field-value {
      font-size: 13px;
      color: var(--text-primary);
      word-break: break-all;
    }

    .field-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }

    /* Utility */
    .label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .flex {
      display: flex;
    }

    .gap-2 {
      gap: 8px;
    }

    .w-full {
      width: 100%;
    }

    .mt-2 {
      margin-top: 8px;
    }

    .mt-3 {
      margin-top: 12px;
    }

    .text-danger {
      color: var(--danger);
    }

    .scrollbar-thin::-webkit-scrollbar {
      width: 3px;
    }

    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: rgba(245, 158, 11, 0.2);
      border-radius: 2px;
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 8px;
      opacity: 0.4;
    }

    svg {
      display: inline-block;
    }
  </style>
</head>

<body>

  <!-- Lock Screen -->
  <div id="screen-lock" class="screen active">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="14" height="14" fill="none" stroke="#0a0908" stroke-width="2.5" viewBox="0 0 24 24">
            <path
              d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
          </svg>
        </div>
        <span class="logo-text">KeyVault</span>
      </div>
    </div>
    <div
      style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 24px;">
      <div
        style="width:52px;height:52px;border-radius:14px;background:var(--accent-dim);border:1px solid rgba(245,158,11,0.3);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
        <svg width="24" height="24" fill="none" stroke="var(--accent)" stroke-width="2" viewBox="0 0 24 24">
          <rect width="18" height="11" x="3" y="11" rx="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>
      <p style="font-size:1.1rem;font-weight:600;color:var(--text-primary);margin-bottom:6px;">Vault Locked</p>
      <p style="font-size:12px;color:var(--text-secondary);text-align:center;margin-bottom:24px;" id="hint-text"></p>
      <input id="master-input" type="password" placeholder="Master password" style="margin-bottom:12px;" />
      <button class="btn btn-primary w-full" id="unlock-btn">Unlock</button>
      <button class="btn btn-ghost w-full mt-2" id="btn-webapp-lock">Open Web App</button>
      <p id="unlock-error" style="color:var(--danger);font-size:11px;margin-top:8px;display:none;text-align:center;">
      </p>
    </div>
  </div>

  <!-- Main Vault -->
  <div id="screen-vault" class="screen">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="14" height="14" fill="none" stroke="#0a0908" stroke-width="2.5" viewBox="0 0 24 24">
            <path
              d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
          </svg>
        </div>
        <span class="logo-text">KeyVault</span>
      </div>
      <div class="flex gap-2">
        <button class="btn-icon" id="btn-add-item" title="Add item">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
        <button class="btn-icon" id="btn-lock" title="Lock vault">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect width="18" height="11" x="3" y="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </button>
      </div>
    </div>
    <div style="padding:10px 10px 4px;">
      <input id="search-input" placeholder="Search vault..." style="font-size:13px;" />
    </div>
    <div id="autofill-banner"
      style="display:none;margin:6px 10px;padding:8px 12px;background:var(--accent-dim);border:1px solid rgba(245,158,11,0.25);border-radius:8px;font-size:12px;color:var(--accent);">
      Matching credentials found for this page
    </div>
    <div id="item-list" class="item-list scrollbar-thin"></div>
  </div>

  <!-- Item Detail -->
  <div id="screen-detail" class="screen">
    <div class="header">
      <button class="btn-icon" id="btn-detail-back">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <span id="detail-title" style="font-weight:600;color:var(--text-primary);">Item</span>
      <button class="btn-icon text-danger" id="btn-delete" title="Delete">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14H6L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
      </button>
    </div>
    <div id="detail-content" style="flex:1;overflow-y:auto;padding:16px;" class="scrollbar-thin"></div>
  </div>

  <!-- Add Item -->
  <div id="screen-add" class="screen">
    <div class="header">
      <button class="btn-icon" id="btn-add-back">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
      <span style="font-weight:600;color:var(--text-primary);">New Item</span>
      <div style="width:30px;"></div>
    </div>
    <div style="flex:1;overflow-y:auto;padding:16px;" class="scrollbar-thin">
      <div class="form-group">
        <div class="label">Name *</div>
        <input id="add-name" placeholder="GitHub" />
      </div>
      <div class="form-group">
        <div class="label">URL</div>
        <input id="add-url" placeholder="https://github.com" />
      </div>
      <div class="form-group">
        <div class="label">Username / Email</div>
        <input id="add-username" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <div class="label">Password</div>
        <div class="flex gap-2">
          <input id="add-password" type="password" placeholder="••••••••" style="flex:1;" />
          <button class="btn-icon" id="btn-gen-password" title="Generate password"
            style="flex-shrink:0;width:36px;height:36px;">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M23 4v6h-6" />
              <path d="M1 20v-6h6" />
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <div class="label">Notes</div>
        <textarea id="add-notes" placeholder="Additional info..." rows="3" style="resize:none;"></textarea>
      </div>
      <div class="flex gap-2 mt-3">
        <button class="btn btn-ghost" id="btn-add-cancel" style="flex:1;">Cancel</button>
        <button class="btn btn-primary" id="btn-save" style="flex:2;">Save to Vault</button>
      </div>
    </div>
  </div>

  <!-- Sign In Screen -->
  <div id="screen-login" class="screen">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="14" height="14" fill="none" stroke="#0a0908" stroke-width="2.5" viewBox="0 0 24 24">
            <path
              d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" />
          </svg>
        </div>
        <span class="logo-text">KeyVault</span>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid var(--border);">
      <button id="tab-signin"
        style="flex:1;padding:10px;background:none;border:none;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid var(--accent);font-family:inherit;">Sign
        In</button>
      <button id="tab-register"
        style="flex:1;padding:10px;background:none;border:none;color:var(--text-secondary);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;">Register</button>
    </div>

    <!-- Sign In Form -->
    <div id="pane-signin" style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px;">
      <div class="form-group">
        <div class="label">Email</div>
        <input id="login-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <div class="label">Password</div>
        <input id="login-password" type="password" placeholder="Your account password" />
      </div>
      <p id="login-error" style="color:var(--danger);font-size:11px;margin-bottom:10px;display:none;"></p>
      <button class="btn btn-primary w-full" id="btn-login">Sign In</button>
    </div>

    <!-- Register Form -->
    <div id="pane-register"
      style="flex:1;display:none;flex-direction:column;justify-content:center;padding:20px;overflow-y:auto;">
      <div class="form-group">
        <div class="label">Email</div>
        <input id="reg-email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <div class="label">Password <span style="color:var(--text-secondary);font-weight:400;">(min 8 chars)</span>
        </div>
        <input id="reg-password" type="password" placeholder="Account password" />
      </div>
      <div class="form-group">
        <div class="label">Full Name <span style="color:var(--text-secondary);font-weight:400;">(optional)</span></div>
        <input id="reg-name" type="text" placeholder="Jane Smith" />
      </div>
      <div class="form-group">
        <div class="label">Master Password Hint <span
            style="color:var(--text-secondary);font-weight:400;">(optional)</span></div>
        <input id="reg-hint" type="text" placeholder="e.g. childhood pet name" />
      </div>
      <p id="reg-error" style="color:var(--danger);font-size:11px;margin-bottom:10px;display:none;"></p>
      <button class="btn btn-primary w-full" id="btn-register">Create Account</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
