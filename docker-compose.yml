services:
  ui:
    image: ${UI_IMAGE:-cipheria-ui}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-}
    environment:
      INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-}
      NODE_ENV: production

  api:
    image: ${API_IMAGE:-cipheria-api}:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - api/.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request;
            urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
